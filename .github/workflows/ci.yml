name: CI/CD for MASOS

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code analysis
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Analiza el repositorio MASOS usando estos subagentes:
              - reward-checker
              - drone-physics-checker
              - simulator-adapter
              - training-monitor
              - real-world-validation
              - integration-checker
              - hardware-compatibility

            Para cada agente:
            - Revisa el código.
            - Devuelve un JSON con: agent, issues, severity, recommendations.