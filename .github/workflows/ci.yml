name: CI/CD for MASOS

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Claude Code analysis
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        prompt: |
          Analiza el repositorio MASOS y usa los siguientes subagentes:
            - reward-checker
            - drone-physics-checker
            - simulator-adapter
            - training-monitor
            - real-world-validation
            - integration-checker
            - hardware-compatibility

          Para cada agente:
          1. Revisa el código y encuentra problemas o mejoras.
          2. Devuelve un JSON con estos campos:
             - agent
             - issues
             - severity
             - recommendations