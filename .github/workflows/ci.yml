name: CI/CD for MASOS

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: InstallClaudeCode
      run: |
        curl -fsSL https://claude.ai/install.sh | bash

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Analyze with Claude and subagents
      run: |
        claude <<EOF
        Analiza el repositorio MASOS usando los subagentes que definimos:
        reward-checker, drone-physics-checker, simulator-adapter,
        training-monitor, real-world-validation, integration-checker y
        hardware-compatibility.

        Para cada subagente:
        - Ejecuta su tarea especializada basándose en el código y la descripción.
        - Resume los hallazgos en formato JSON con estas claves:
           "agent", "issues", "recommendations", "severity"
        Devuélveme ese JSON completo.
        EOF